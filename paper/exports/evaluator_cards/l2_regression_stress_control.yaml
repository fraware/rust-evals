surface_id: l2_regression_stress_control
purpose: >-
  Predeclared regression stress-control arm (33 base rows mirrored from the
  augmented arm) demonstrating evaluator-induced reversals via a forced-fail hook.
scientific_question: >-
  Under a fixed protocol that includes regression_forced_fail, how do L1-pass
  rows map to L2_REGRESSION_FAIL, separate from augmented-test semantics?
applicability_domain: >-
  results_regression_fail merge slice for runs/released/l2_verified_flagship_v1/.
benchmark_sources: Same flagship task IDs as the augmented arm.
candidate_sources: Same frozen candidates as the augmented arm.
selection_rule: >-
  Deterministic strengthening_spec_regression_fail.json including
  regression_forced_fail for every base row in this arm.
exclusion_rule: No post-hoc shrinking of the 66-row merged design.
denominator_rule: >-
  Regression-arm failures tagged L2_REGRESSION_FAIL in merged batch_summary.json.
invalid_row_rule: Same invalid handling as flagship L2 batch summaries.
levels_used: L0, L1, L2
validator_families: targeted_regression with forced-fail control per spec.
known_false_positive_risks: >-
  Forced non-zero exits can fire even when ticket semantics are fine; rows are
  protocol controls, not natural regression detectors alone.
known_false_negative_risks: >-
  Passing this arm does not imply absence of real regressions outside the forced
  protocol.
gold_patch_validation: >-
  Headline gold uses gold-mechanical profile so forced-fail artifacts do not
  dominate reference-patch acceptance (see docs/l2_gold_patch_validation.md).
human_review: >-
  Cases in docs/l2_failure_case_studies.md labeled as stress-control reversals or
  infrastructure artifacts where appropriate.
reproduction_command: >-
  python ci/scripts/check_evidence_quality.py l2
  --run-dir runs/released/l2_verified_flagship_v1/results
source_paths: >-
  runs/released/l2_verified_flagship_v1/results_regression_fail/;
  paper/exports/l2_verified_flagship_v1/
claim_status: central
interpretation_warning: >-
  This arm includes regression_forced_fail. Reversals are protocol-control evidence,
  not natural product-regression evidence.
