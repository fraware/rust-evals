surface_id: l2_augmented_tests
purpose: >-
  Strengthened augmented-test validator arm for the L2 flagship 66-row cohort
  (33 base rows), measuring L1-pass to L2-fail under predeclared pytest stress.
scientific_question: >-
  Among L1-passing frozen candidates, which rows fail issue-relevant augmented
  validators under a fixed strengthening spec?
applicability_domain: >-
  Merged results_astropy arm for runs/released/l2_verified_flagship_v1/; same
  11-task verified-style slice as the flagship panel.
benchmark_sources: SWE-Bench Verified-style tasks in the flagship panel manifest.
candidate_sources: >-
  Frozen JSON candidates shared with the Verified flagship panel assembly.
selection_rule: >-
  One augmented-test evaluation per (task, agent) base row; deterministic spec
  strengthening_spec.json (Astropy arm) as frozen in the run README.
exclusion_rule: >-
  No post-hoc row removal from the 66-row design; invalid execution is reported
  per row.
denominator_rule: >-
  Arm-specific counts follow merged batch_summary.json; augmented-test failures
  are tagged L2_AUG_TESTS_FAIL.
invalid_row_rule: >-
  Documented in batch summaries; gold validation denominators are separate (see
  gold protocol).
levels_used: L0, L1, L2
validator_families: augmented_unit_tests (warnings-as-errors stress paths per spec).
known_false_positive_risks: >-
  Tooling or selector mismatch can fail candidates or gold in ways weakly tied to
  ticket semantics.
known_false_negative_risks: >-
  Passing augmented tests does not guarantee semantic completeness beyond the
  declared obligations.
gold_patch_validation: >-
  Headline gold-mechanical replay under strengthening_spec_gold_mechanical.json;
  see gold_patch_validation_summary.json.
human_review: >-
  Eight-case qualitative adjudication in docs/l2_failure_case_studies.md
  (diagnostic, not a population rate estimate).
reproduction_command: >-
  python ci/scripts/check_evidence_quality.py l2
  --run-dir runs/released/l2_verified_flagship_v1/results
source_paths: >-
  runs/released/l2_verified_flagship_v1/results/;
  paper/exports/l2_verified_flagship_v1/
claim_status: central
