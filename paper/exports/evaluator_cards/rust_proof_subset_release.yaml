surface_id: rust_proof_subset_release
purpose: >-
  Sealed L0–L4 ladder evaluation on a curated Rust proof subset with Lean L4
  obligations attached to public task identifiers.
scientific_question: >-
  Can machine-checkable obligations be attached and audited on real Rust tasks
  under policy-aware execution, and what natural L3/L4 separation exists today?
applicability_domain: >-
  runs/released/rust_proof_subset_v1/results_seal/ with manifest
  datasets/derived/proof_subset/manifest.jsonl; paper export
  paper/exports/rust_proof_subset_v1_seal_release/.
benchmark_sources: Rust-SWE-bench-derived public task identifiers in the proof manifest.
candidate_sources: >-
  Frozen golden_agent (or panel-specified) candidates referenced by the sealed batch.
selection_rule: >-
  Curated manifest.jsonl obligations; deterministic batch driver per run README.
exclusion_rule: >-
  Paper-semantics counterexample replays are mechanism tests only and must not be
  mixed into headline natural-evidence tables.
denominator_rule: >-
  Eight-row sealed real-manifest cohort for current publication-threshold semantic discussion.
invalid_row_rule: >-
  Integrity via eval-ladder verify run-dir; invalid bundles reported in summaries.
levels_used: L0, L1, L2, L3, L4
validator_families: >-
  Rust adapter validators plus Lean obligation checking for L4 as configured in
  the proof-subset policy.
known_false_positive_risks: >-
  Obligation sketches may be narrower than full informal issue semantics.
known_false_negative_risks: >-
  Passing L4 for the stated obligation does not certify informal completeness.
gold_patch_validation: >-
  Reference semantics checked via Lean obligations where applicable; see proof subset policy.
human_review: >-
  Qualitative interpretation only; natural sealed cohort currently lacks L3-pass/L4-fail separation.
reproduction_command: >-
  python ci/scripts/check_evidence_quality.py --gate-profile release rust-proof
  --run-dir runs/released/rust_proof_subset_v1/results_seal
source_paths: >-
  runs/released/rust_proof_subset_v1/results_seal/;
  paper/exports/rust_proof_subset_v1_seal_release/;
  datasets/derived/proof_subset/manifest.jsonl
claim_status: frontier
