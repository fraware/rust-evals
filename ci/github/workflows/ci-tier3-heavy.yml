name: ci-tier3-heavy

on:
  workflow_dispatch: {}
  schedule:
    # Weekly on Mondays at 04:17 UTC. Heavy tier is opt-in by design; see
    # docs/operational_runbook.md for the rationale.
    - cron: "17 4 * * 1"

permissions:
  contents: read

concurrency:
  group: ci-tier3-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: -D warnings

jobs:
  fixture-replay:
    name: Sampled fixture replay + proof-subset smoke
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: Swatinem/rust-cache@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python package (editable) with dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Install elan / Lean (pinned by lean-toolchain)
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain none
          echo "$HOME/.elan/bin" >> $GITHUB_PATH

      - name: Run fixture replay (Tier 3)
        run: bash ci/scripts/run_tier3_fixtures.sh
